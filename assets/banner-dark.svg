<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <!-- Dark variant: ink ground, cream + gold + warmer arc colors for contrast against dark -->
  <rect width="1200" height="420" fill="#1A1612"/>

  <!-- Subtle grain -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.95 0 0 0 0 0.9 0 0 0 0 0.84 0 0 0 0.04 0"/>
  </filter>
  <rect width="1200" height="420" filter="url(#grain)"/>

  <!-- Top + bottom gold hairlines -->
  <line x1="80" y1="56" x2="1120" y2="56" stroke="#B89253" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="80" y1="364" x2="1120" y2="364" stroke="#B89253" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Sanctum mark, scaled — arcs lifted toward warmer tones on dark for legibility -->
  <g transform="translate(140 100) scale(5.8)">
    <path d="M 3.5 24 Q 16 3.5 28.5 24" stroke="#D4756F" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 7 24 Q 16 7.5 25 24" stroke="#D4A968" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 10.5 24 Q 16 11.5 21.5 24" stroke="#7BA3CC" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="16" y1="24" x2="16" y2="29" stroke="#FBF8F1" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="13.5" y1="26.5" x2="18.5" y2="26.5" stroke="#FBF8F1" stroke-width="1.75" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="380" y="200" font-family="Cormorant Garamond, Garamond, Times New Roman, serif" font-size="86" font-style="italic" font-weight="500" fill="#FBF8F1" letter-spacing="-1">Celestial Sanctum</text>
  <text x="380" y="252" font-family="Cormorant Garamond, Garamond, Times New Roman, serif" font-size="48" font-style="italic" font-weight="400" fill="#D4A968" letter-spacing="-0.5">Parish</text>

  <!-- Eyebrow -->
  <text x="380" y="148" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#7BA3CC" letter-spacing="4.5">CELESTIAL CHURCH OF CHRIST · BLOOMINGTON, CA</text>

  <!-- Footer tagline -->
  <text x="380" y="306" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#9B9387" font-weight="400">Angular 21 SSR · Reverent Minimalism · Deployed on Vercel</text>
</svg>
