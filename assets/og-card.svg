<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- OG card variant of banner-dark, 1200x630 (2:1.05 ratio for social cards). -->
  <rect width="1200" height="630" fill="#1A1612"/>

  <!-- Subtle grain -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.95 0 0 0 0 0.9 0 0 0 0 0.84 0 0 0 0.04 0"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)"/>

  <!-- Top + bottom gold hairlines -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#B89253" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#B89253" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Eyebrow -->
  <text x="600" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7BA3CC" letter-spacing="5">CELESTIAL CHURCH OF CHRIST · BLOOMINGTON, CA</text>

  <!-- Sanctum mark, centered + larger -->
  <g transform="translate(520 220) scale(7)">
    <path d="M 3.5 24 Q 16 3.5 28.5 24" stroke="#D4756F" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 7 24 Q 16 7.5 25 24" stroke="#D4A968" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 10.5 24 Q 16 11.5 21.5 24" stroke="#7BA3CC" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="16" y1="24" x2="16" y2="29" stroke="#FBF8F1" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="13.5" y1="26.5" x2="18.5" y2="26.5" stroke="#FBF8F1" stroke-width="1.75" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="500" text-anchor="middle" font-family="Cormorant Garamond, Garamond, Times New Roman, serif" font-size="84" font-style="italic" font-weight="500" fill="#FBF8F1" letter-spacing="-1">Celestial Sanctum Parish</text>
</svg>
