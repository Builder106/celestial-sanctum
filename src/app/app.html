@if (!bareChrome()) {
  <sanctum-header />
}
<main
  id="main"
  class="route-host"
  [class.pb-mobile-tabs]="isNative && !bareChrome()"
  [@routeFade]="prepareRoute(outlet)"
>
  <router-outlet #outlet="outlet" />
</main>
@if (!bareChrome() && !isNative) {
  <sanctum-footer />
}
@if (isNative && !bareChrome()) {
  <sanctum-mobile-tab-bar />
}
<!-- Global search palette: lives at the root so ⌘K works on every route
     (the keyboard listener inside the component is registered on the
     document). Hidden visually until the palette opens. -->
<sanctum-search-palette />
<!-- Foreground push notifications surface here as in-app toasts. -->
<sanctum-toasts />
<!-- Promise-based confirmation dialog (replaces window.confirm). -->
<sanctum-confirm />
